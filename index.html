<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="OpenTable connects surplus food with communities in need, using AI to categorize and verify food safety in real-time." />
  <meta name="theme-color" content="#f97316" />
  <title>OpenTable - Food Waste Prevention</title>

  <!-- Preconnect to external origins for faster loading -->
  <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin />
  <link rel="preconnect" href="https://www.googleapis.com" crossorigin />
  <link rel="preconnect" href="https://res.cloudinary.com" crossorigin />
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="dns-prefetch" href="https://api.cloudinary.com" />
  <link rel="dns-prefetch" href="https://identitytoolkit.googleapis.com" />

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Outfit', 'sans-serif'],
          },
          animation: {
            'float-slow': 'float 20s ease-in-out infinite',
            'float-medium': 'float 15s ease-in-out infinite reverse',
            'float-fast': 'float 10s ease-in-out infinite alternate',
            'spin-slow': 'spin 30s linear infinite',
            'slide-down': 'slideDown 0.4s cubic-bezier(0.16, 1, 0.3, 1)',
            'shrink-bar': 'shrinkBar linear forwards',
          },
          keyframes: {
            float: {
              '0%, 100%': { transform: 'translateY(0px) rotate(0deg)' },
              '50%': { transform: 'translateY(-30px) rotate(15deg)' },
            },
            slideDown: {
              '0%': { opacity: '0', transform: 'translate(-50%, -100%)' },
              '100%': { opacity: '1', transform: 'translate(-50%, 0)' },
            },
            shrinkBar: {
              '0%': { width: '100%' },
              '100%': { width: '0%' },
            },
          },
          colors: {
            orange: {
              50: '#fffcf5',
              100: '#ffedd5',
              200: '#fed7aa',
              300: '#fdba74',
              400: '#fb923c',
              500: '#f97316',
              600: '#ea580c',
              700: '#c2410c',
              800: '#9a3412',
              900: '#7c2d12',
            },
            green: {
              50: '#fffcf5', // Alias green to orange so missed files still look correct
              100: '#ffedd5',
              200: '#fed7aa',
              300: '#fdba74',
              400: '#fb923c',
              500: '#f97316',
              600: '#ea580c',
              700: '#c2410c',
              800: '#9a3412',
              900: '#7c2d12',
            },
            gray: {
              50: '#fafaf9',
              100: '#f5f5f4',
              200: '#e7e5e4',
              300: '#d6d3d1',
              400: '#a8a29e',
              500: '#78716c',
              600: '#57534e',
              700: '#44403c',
              800: '#292524',
              900: '#1c1917',
            }
          }
        }
      }
    }
  </script>
  <style>
    body {
      font-family: 'Outfit', sans-serif;
      background-color: #ffffff;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Subtle organic shapes/gradients */
    .bg-warm-gradient {
      background: linear-gradient(135deg, #fff7ed 0%, #ffffff 100%);
    }

    .text-brand-gradient {
      background: linear-gradient(135deg, #f59e0b 0%, #ea580c 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
  </style>

  <link rel="stylesheet" href="/index.css">
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/index.tsx"></script>
</body>

</html>
